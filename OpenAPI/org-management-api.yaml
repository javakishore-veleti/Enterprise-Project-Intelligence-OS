              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - organizations
      summary: List Organizations
      operationId: listOrganizations
      parameters:
      - name: root
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Tenant root org id; omit for all roots.
          title: Root
        description: Tenant root org id; omit for all roots.
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
