        total:
          anyOf:
          - type: integer
          - type: 'null'
          title: Total
        returned:
          anyOf:
          - type: integer
          - type: 'null'
          title: Returned
        offset:
          anyOf:
          - type: integer
          - type: 'null'
          title: Offset
        limit:
          anyOf:
          - type: integer
          - type: 'null'
          title: Limit
      additionalProperties: false
      type: object
      required:
      - org_id
      title: MembersResponse
      description: 'Members of an org. The paging fields are populated by the paginated
        list

        endpoint; ``None`` when unset.'
    MoveOrganizationRequest:
      properties:
