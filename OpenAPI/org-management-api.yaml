      type: object
      required:
      - total_orgs
      - root_count
      - total_members
      - total_repositories
      title: OrgStatsResponse
      description: "Cheap tenancy aggregate counts (COUNT queries only \u2014 never\
        \ a subtree\nfetch). Powers the dashboard org summary. ``root`` scopes to\
        \ one tenant."
    OrganizationListResponse:
      properties:
        organizations:
          items:
            $ref: '#/components/schemas/OrganizationResponse'
          type: array
          title: Organizations
          default: []
        total:
          anyOf:
          - type: integer
          - type: 'null'
          title: Total
        returned:
          anyOf:
          - type: integer
          - type: 'null'
          title: Returned
        offset:
          anyOf:
          - type: integer
          - type: 'null'
          title: Offset
        limit:
          anyOf:
          - type: integer
          - type: 'null'
