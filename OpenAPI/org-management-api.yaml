          items:
            $ref: '#/components/schemas/RoleView'
          type: array
          title: Direct Roles
          default: []
        inherited_roles:
          items:
            $ref: '#/components/schemas/InheritedRoleView'
          type: array
          title: Inherited Roles
          default: []
