  /health/live:
    get:
      tags:
      - health
      summary: Liveness
      operationId: getLiveness
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    get:
      tags:
