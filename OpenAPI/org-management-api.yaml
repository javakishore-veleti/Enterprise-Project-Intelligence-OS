      tags:
      - organizations
      summary: Search Organizations
      operationId: searchOrganizations
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          description: Case-insensitive substring match on org name.
          title: Q
        description: Case-insensitive substring match on org name.
      - name: root
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
