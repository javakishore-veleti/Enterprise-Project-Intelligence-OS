      description: How a `shared` grant cascades to the grantee side.
    GrantResponse:
      properties:
        repo_id:
          type: string
          title: Repo Id
        grantee_org_id:
          type: string
          title: Grantee Org Id
        direction:
          type: string
          title: Direction
      additionalProperties: false
      type: object
      required:
      - repo_id
      - grantee_org_id
      - direction
      title: GrantResponse
    GrantsResponse:
      properties:
        repo_id:
          type: string
          title: Repo Id
        grants:
          items:
            $ref: '#/components/schemas/GrantResponse'
          type: array
          title: Grants
          default: []
        total:
          anyOf:
          - type: integer
          - type: 'null'
          title: Total
        returned:
          anyOf:
          - type: integer
          - type: 'null'
          title: Returned
        offset:
          anyOf:
          - type: integer
          - type: 'null'
          title: Offset
        limit:
          anyOf:
          - type: integer
          - type: 'null'
