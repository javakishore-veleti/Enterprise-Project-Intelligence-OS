      - source_org_name
      - source_org_level
      title: InheritedRoleView
      description: A role that applies to a member via an ancestor org (inherited
        down).
    MemberResponse:
      properties:
        user_id:
          type: string
          title: User Id
        subject:
          type: string
          title: Subject
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        roles:
          items:
            $ref: '#/components/schemas/RoleView'
          type: array
          title: Roles
          default: []
