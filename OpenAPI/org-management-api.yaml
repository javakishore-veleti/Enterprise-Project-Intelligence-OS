        in: path
        required: true
        schema:
          type: string
          title: Org Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring filter on the DIRECT child names.
          title: Q
        description: Case-insensitive substring filter on the DIRECT child names.
      - name: sort
        in: query
        required: false
        schema:
          type: string
          pattern: ^(name|created_at|child_count)$
          description: "Order key: name (A\u2192Z), created_at (newest first), child_count\
            \ (most sub-orgs first)."
          default: name
          title: Sort
        description: "Order key: name (A\u2192Z), created_at (newest first), child_count\
