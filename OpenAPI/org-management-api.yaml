          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectiveProjectsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AddGrantRequest:
      properties:
        grantee_org_id:
          type: string
          minLength: 1
          title: Grantee Org Id
        direction:
          $ref: '#/components/schemas/GrantDirection'
          default: org
      additionalProperties: false
      type: object
      required:
      - grantee_org_id
      title: AddGrantRequest
    AddMemberRequest:
      properties:
        subject:
          type: string
          minLength: 1
          title: Subject
        roles:
          items:
            type: string
          type: array
          title: Roles
        inherits_down:
          type: boolean
          title: Inherits Down
          default: true
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
      additionalProperties: false
      type: object
      required:
      - subject
      title: AddMemberRequest
      description: Add a user (created if unknown) to an org with one or more roles.
    AddTrackerProjectsRequest:
      properties:
        projects:
          items:
            $ref: '#/components/schemas/TrackerProjectInput'
          type: array
          minItems: 1
          title: Projects
      additionalProperties: false
      type: object
      required:
      - projects
      title: AddTrackerProjectsRequest
      description: Add one or more tracker projects to a repository (bulk ok).
    CreateOrganizationRequest:
      properties:
        name:
          type: string
          minLength: 1
          title: Name
        parent_org_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Org Id
        kind:
          anyOf:
          - type: string
          - type: 'null'
          title: Kind
      additionalProperties: false
      type: object
      required:
      - name
      title: CreateOrganizationRequest
      description: 'Create an org. With `parent_org_id` it is a sub-branch (root/path/depth/

        level derived from the parent); without it, a brand-new root/tenant.'
    CreateRepositoryRequest:
      properties:
        provider:
          $ref: '#/components/schemas/Provider'
        external_account:
          anyOf:
          - type: string
          - type: 'null'
          title: External Account
        visibility_scope:
          $ref: '#/components/schemas/VisibilityScope'
          default: org
        connection_config:
          additionalProperties: true
          type: object
          title: Connection Config
      additionalProperties: false
      type: object
      required:
      - provider
      title: CreateRepositoryRequest
    CreateUserRequest:
      properties:
        subject:
          type: string
          minLength: 1
          title: Subject
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
      additionalProperties: false
      type: object
      required:
      - subject
      title: CreateUserRequest
    EffectiveProjectsResponse:
      properties:
        org_id:
          type: string
          title: Org Id
        projects:
          items:
            $ref: '#/components/schemas/VisibleProjectResponse'
          type: array
          title: Projects
          default: []
        total:
          anyOf:
          - type: integer
          - type: 'null'
          title: Total
        returned:
          anyOf:
          - type: integer
          - type: 'null'
          title: Returned
        offset:
          anyOf:
          - type: integer
          - type: 'null'
          title: Offset
        limit:
          anyOf:
          - type: integer
          - type: 'null'
          title: Limit
      additionalProperties: false
      type: object
      required:
      - org_id
      title: EffectiveProjectsResponse
      description: 'An org''s effective (visible) tracker projects, with the same
