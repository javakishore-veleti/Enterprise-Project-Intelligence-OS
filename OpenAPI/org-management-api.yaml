              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/orgs:
    post:
      tags:
      - organizations
      summary: Create Organization
      operationId: createOrganization
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
