openapi: 3.1.0
info:
  title: Admin API
  description: Platform, agent, model, prompt, schedule, and audit administration
    for Enterprise Project Intelligence OS.
  version: 0.1.0
paths:
  /health/live:
    get:
      tags:
      - health
      summary: Liveness
      operationId: getLiveness
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    get:
      tags:
      - health
      summary: Readiness
      operationId: getReadiness
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/admin/agents:
    get:
      tags:
      - agents
      summary: List Agents
      operationId: listAgentConfigs
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConfigListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/agents/{agent_key}:
    get:
      tags:
      - agents
      summary: Get Agent
      operationId: getAgentConfig
      parameters:
      - name: agent_key
        in: path
        required: true
        schema:
          type: string
          title: Agent Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - agents
      summary: Upsert Agent
      operationId: upsertAgentConfig
      parameters:
      - name: agent_key
        in: path
        required: true
        schema:
          type: string
          title: Agent Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertAgentConfigRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/audit:
    get:
      tags:
      - system
      summary: Get Audit
      operationId: getAuditHistory
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/system/health:
    get:
      tags:
      - system
      summary: Get System Health
      operationId: getSystemHealth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealthResponse'
  /api/v1/admin/dataset/status:
    get:
      tags:
      - dataset
      summary: Get Dataset Status
      operationId: getDatasetStatus
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatusResponse'
  /api/v1/admin/dataset/download:
    post:
      tags:
      - dataset
      summary: Download Dataset
      description: Trigger the Airflow-driven dataset download (via the Ingestion
        API).
      operationId: downloadDataset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatusResponse'
  /api/v1/admin/dataset/ingestion:
    get:
      tags:
      - dataset
      summary: Get Dataset Ingestion
      operationId: getDatasetIngestion
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionProgressResponse'
  /api/v1/admin/dataset/ingest:
    post:
      tags:
      - dataset
      summary: Ingest Dataset
      description: Trigger the Airflow-driven batch ingestion into the evidence store.
      operationId: ingestDataset
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionProgressResponse'
components:
  schemas:
    AgentConfigListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/AgentConfigResponse'
          type: array
          title: Items
        page:
          $ref: '#/components/schemas/PageMeta'
      additionalProperties: false
      type: object
      required:
      - items
      - page
      title: AgentConfigListResponse
    AgentConfigResponse:
      properties:
        agent_key:
          type: string
          title: Agent Key
        display_name:
          type: string
          title: Display Name
        enabled:
          type: boolean
          title: Enabled
        model:
          type: string
          title: Model
        framework:
          $ref: '#/components/schemas/AgentFramework'
        prompt_ref:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Ref
        updated_by:
          type: string
          title: Updated By
        updated_at:
          type: string
          format: date-time
          title: Updated At
      additionalProperties: false
      type: object
      required:
      - agent_key
      - display_name
      - enabled
      - model
      - framework
      - prompt_ref
      - updated_by
      - updated_at
      title: AgentConfigResponse
      description: Public view of an agent's runtime configuration.
    AgentFramework:
      type: string
      enum:
      - langgraph
      - crewai
      - openai_agents
      - strands
      - google_adk
      - ms_agent_framework
      title: AgentFramework
      description: 'Orchestration framework an agent executes under.


        The default is LangGraph; the alternatives are pluggable adapters behind

        each agent''s framework-agnostic port (see Agents/README.md). Selecting a

        framework here is how the platform toggles orchestration per agent.'
    AuditEventResponse:
      properties:
        event_id:
          type: string
          title: Event Id
        entity_type:
          type: string
          title: Entity Type
        entity_key:
          type: string
          title: Entity Key
        action:
          type: string
          title: Action
        actor:
          type: string
          title: Actor
        details:
          additionalProperties: true
          type: object
          title: Details
        created_at:
          type: string
          format: date-time
          title: Created At
      additionalProperties: false
      type: object
      required:
      - event_id
      - entity_type
      - entity_key
      - action
      - actor
      - details
      - created_at
      title: AuditEventResponse
      description: An administrative audit record.
    AuditListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/AuditEventResponse'
          type: array
          title: Items
        page:
          $ref: '#/components/schemas/PageMeta'
      additionalProperties: false
      type: object
      required:
      - items
      - page
      title: AuditListResponse
    DatasetStatusResponse:
      properties:
        dataset_id:
          type: string
          title: Dataset Id
        title:
          type: string
          title: Title
        state:
          type: string
          title: State
        file_name:
          type: string
          title: File Name
        source_url:
          type: string
          title: Source Url
        expected_md5:
          type: string
          title: Expected Md5
        size_bytes:
          type: integer
          title: Size Bytes
        downloaded_bytes:
          type: integer
          title: Downloaded Bytes
        message:
          type: string
          title: Message
        zenodo_record:
          anyOf:
          - type: string
          - type: 'null'
          title: Zenodo Record
        downloaded_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Downloaded At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      additionalProperties: false
      type: object
      required:
      - dataset_id
      - title
      - state
      - file_name
      - source_url
      - expected_md5
      - size_bytes
      - downloaded_bytes
      - message
      - updated_at
      title: DatasetStatusResponse
    EntityProgress:
      properties:
        entity:
          type: string
          title: Entity
        records_done:
          type: integer
          title: Records Done
        records_total:
          type: integer
          title: Records Total
        status:
          type: string
          title: Status
      additionalProperties: false
      type: object
      required:
      - entity
      - records_done
      - records_total
      - status
      title: EntityProgress
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
        service:
          type: string
          title: Service
        dependencies:
          additionalProperties:
            type: string
          type: object
          title: Dependencies
          default: {}
      additionalProperties: false
      type: object
      required:
      - status
      - service
      title: HealthResponse
    IngestionLogEntry:
      properties:
        level:
          type: string
          title: Level
        entity:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity
        message:
          type: string
          title: Message
        records_done:
          type: integer
          title: Records Done
        records_total:
          type: integer
          title: Records Total
        created_at:
          type: string
          format: date-time
          title: Created At
      additionalProperties: false
      type: object
      required:
      - level
      - entity
      - message
      - records_done
      - records_total
      - created_at
      title: IngestionLogEntry
    IngestionProgressResponse:
      properties:
        run_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Run Id
        dataset_id:
          type: string
          title: Dataset Id
        status:
          type: string
          title: Status
        started_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Started At
        finished_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Finished At
        records_done:
          type: integer
          title: Records Done
          default: 0
        records_total:
          type: integer
          title: Records Total
          default: 0
        entities:
          items:
            $ref: '#/components/schemas/EntityProgress'
          type: array
          title: Entities
          default: []
        recent_log:
          items:
            $ref: '#/components/schemas/IngestionLogEntry'
          type: array
          title: Recent Log
          default: []
      additionalProperties: false
      type: object
      required:
      - run_id
      - dataset_id
      - status
      title: IngestionProgressResponse
    PageMeta:
      properties:
        total:
          type: integer
          title: Total
        limit:
          type: integer
          title: Limit
        offset:
          type: integer
          title: Offset
      additionalProperties: false
      type: object
      required:
      - total
      - limit
      - offset
      title: PageMeta
    SystemHealthResponse:
      properties:
        status:
          type: string
          title: Status
        service:
          type: string
          title: Service
        dependencies:
          additionalProperties:
            type: string
          type: object
          title: Dependencies
        agent_count:
          type: integer
          title: Agent Count
        enabled_agent_count:
          type: integer
          title: Enabled Agent Count
      additionalProperties: false
      type: object
      required:
      - status
      - service
      - dependencies
      - agent_count
      - enabled_agent_count
      title: SystemHealthResponse
      description: Aggregate platform health as seen by the Admin API.
    UpsertAgentConfigRequest:
      properties:
        enabled:
          type: boolean
          title: Enabled
          default: true
        model:
          type: string
          minLength: 1
          title: Model
          description: Reasoning model id, e.g. claude-opus-4-8.
        framework:
          $ref: '#/components/schemas/AgentFramework'
          default: langgraph
        prompt_ref:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Ref
          description: Reference/version of the agent prompt.
        updated_by:
          type: string
          minLength: 1
          title: Updated By
          default: admin
      additionalProperties: false
      type: object
      required:
      - model
      title: UpsertAgentConfigRequest
      description: Create or update an agent's runtime configuration.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
