openapi: 3.1.0
info:
  title: Ingestion API
  description: Dataset ingestion management for Enterprise Project Intelligence OS.
  version: 0.1.0
paths:
  /health/live:
    get:
      tags:
      - health
      summary: Liveness
      operationId: getLiveness
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    get:
      tags:
      - health
      summary: Readiness
      operationId: getReadiness
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/ingestion/runs:
    post:
      tags:
      - ingestion
      summary: Start Ingestion
      operationId: startIngestion
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartIngestionRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRunResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/runs/{run_id}:
    get:
      tags:
      - ingestion
      summary: Get Ingestion Status
      operationId: getIngestionStatus
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRunResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/acquisitions:
    post:
      tags:
      - operations
      summary: Start Acquisition
      operationId: startAcquisition
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcquireDatasetRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisitionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/acquisitions/{acquisition_id}:
    get:
      tags:
      - operations
      summary: Get Acquisition
      operationId: getAcquisition
      parameters:
      - name: acquisition_id
        in: path
        required: true
        schema:
          type: string
          title: Acquisition Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisitionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/acquisitions/{acquisition_id}/verify:
    post:
      tags:
      - operations
      summary: Verify Acquisition
      operationId: verifyAcquisition
      parameters:
      - name: acquisition_id
        in: path
        required: true
        schema:
          type: string
          title: Acquisition Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyAcquisitionRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisitionVerifyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/acquisitions/{acquisition_id}/extract:
    post:
      tags:
      - operations
      summary: Extract Acquisition
      operationId: extractAcquisition
      parameters:
      - name: acquisition_id
        in: path
        required: true
        schema:
          type: string
          title: Acquisition Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisitionExtractResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/validations:
    post:
      tags:
      - operations
      summary: Start Validation
      operationId: startValidation
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateDatasetRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/validations/{validation_id}:
    get:
      tags:
      - operations
      summary: Get Validation
      operationId: getValidation
      parameters:
      - name: validation_id
        in: path
        required: true
        schema:
          type: string
          title: Validation Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/indexes:
    post:
      tags:
      - operations
      summary: Start Indexing
      operationId: startIndexing
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndexDatasetRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/indexes/{index_job_id}:
    get:
      tags:
      - operations
      summary: Get Indexing
      operationId: getIndexing
      parameters:
      - name: index_job_id
        in: path
        required: true
        schema:
          type: string
          title: Index Job Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/reconciliations:
    post:
      tags:
      - operations
      summary: Start Reconciliation
      operationId: startReconciliation
      parameters:
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconcileDatasetRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/reconciliations/{reconciliation_id}:
    get:
      tags:
      - operations
      summary: Get Reconciliation
      operationId: getReconciliation
      parameters:
      - name: reconciliation_id
        in: path
        required: true
        schema:
          type: string
          title: Reconciliation Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/datasets/{dataset_id}:
    get:
      tags:
      - datasets
      summary: Get Dataset Status
      operationId: getDatasetStatus
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/datasets/{dataset_id}/acquire:
    post:
      tags:
      - datasets
      summary: Acquire Dataset
      description: Trigger the Airflow acquire DAG and mark the dataset DOWNLOADING.
      operationId: acquireDataset
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/datasets/{dataset_id}/status:
    put:
      tags:
      - datasets
      summary: Update Dataset Status
      description: State updates posted by the Airflow acquire DAG as it downloads.
      operationId: updateDatasetStatus
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDatasetStatusRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/datasets/{dataset_id}/ingest:
    post:
      tags:
      - ingestion
      summary: Start Ingestion
      operationId: startDatasetIngestion
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartDatasetIngestionRequest'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionProgressResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/datasets/{dataset_id}/ingestion:
    get:
      tags:
      - ingestion
      summary: Get Ingestion Progress
      operationId: getDatasetIngestionProgress
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionProgressResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/runs/{run_id}/progress:
    post:
      tags:
      - ingestion
      summary: Report Batch Progress
      description: Per-batch checkpoint + progress event posted by the ingest DAG.
      operationId: reportBatchProgress
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportBatchProgressRequest'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/runs/{run_id}/status:
    put:
      tags:
      - ingestion
      summary: Finalize Run
      description: Run-level status finalization posted by the ingest DAG.
      operationId: finalizeIngestionRun
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRunStatusRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRunResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ingestion/runs/{run_id}/entities/{entity}/committed-batches:
    get:
      tags:
      - ingestion
      summary: Committed Batches
      description: "Batch numbers already committed for (run, entity) \u2014 the DAG\
        \ skips these to resume."
      operationId: getCommittedBatches
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      - name: entity
        in: path
        required: true
        schema:
          type: string
          title: Entity
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AcquireDatasetRequest:
      properties:
        dataset_id:
          type: string
          minLength: 1
          title: Dataset Id
        source_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Url
        requested_by:
          type: string
          minLength: 1
          title: Requested By
          default: system
      additionalProperties: false
      type: object
      required:
      - dataset_id
      title: AcquireDatasetRequest
    AcquisitionExtractResponse:
      properties:
        acquisition_id:
          type: string
          title: Acquisition Id
        status:
          type: string
          title: Status
        extracted:
          type: boolean
          title: Extracted
        file_count:
          type: integer
          title: File Count
      additionalProperties: false
      type: object
      required:
      - acquisition_id
      - status
      - extracted
      - file_count
      title: AcquisitionExtractResponse
    AcquisitionResponse:
      properties:
        acquisition_id:
          type: string
          title: Acquisition Id
        dataset_id:
          type: string
          title: Dataset Id
        status:
          type: string
          title: Status
      additionalProperties: false
      type: object
      required:
      - acquisition_id
      - dataset_id
      - status
      title: AcquisitionResponse
    AcquisitionVerifyResponse:
      properties:
        acquisition_id:
          type: string
          title: Acquisition Id
        status:
          type: string
          title: Status
        verified:
          type: boolean
          title: Verified
        actual_sha256:
          type: string
          title: Actual Sha256
      additionalProperties: false
      type: object
      required:
      - acquisition_id
      - status
      - verified
      - actual_sha256
      title: AcquisitionVerifyResponse
    DatasetStatusResponse:
      properties:
        dataset_id:
          type: string
          title: Dataset Id
        title:
          type: string
          title: Title
        state:
          type: string
          title: State
        file_name:
          type: string
          title: File Name
        source_url:
          type: string
          title: Source Url
        expected_md5:
          type: string
          title: Expected Md5
        size_bytes:
          type: integer
          title: Size Bytes
        downloaded_bytes:
          type: integer
          title: Downloaded Bytes
        message:
          type: string
          title: Message
        zenodo_record:
          anyOf:
          - type: string
          - type: 'null'
          title: Zenodo Record
        downloaded_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Downloaded At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      additionalProperties: false
      type: object
      required:
      - dataset_id
      - title
      - state
      - file_name
      - source_url
      - expected_md5
      - size_bytes
      - downloaded_bytes
      - message
      - updated_at
      title: DatasetStatusResponse
      description: Acquisition status of a configured dataset (the Initial Dataset
        feature).
    EntityProgress:
      properties:
        entity:
          type: string
          title: Entity
        records_done:
          type: integer
          title: Records Done
        records_total:
          type: integer
          title: Records Total
        status:
          type: string
          title: Status
      additionalProperties: false
      type: object
      required:
      - entity
      - records_done
      - records_total
      - status
      title: EntityProgress
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
        service:
          type: string
          title: Service
        dependencies:
          additionalProperties:
            type: string
          type: object
          title: Dependencies
          default: {}
      additionalProperties: false
      type: object
      required:
      - status
      - service
      title: HealthResponse
      description: Liveness / readiness payload.
    IndexDatasetRequest:
      properties:
        dataset_id:
          type: string
          minLength: 1
          title: Dataset Id
        targets:
          items:
            type: string
          type: array
          title: Targets
        requested_by:
          type: string
          minLength: 1
          title: Requested By
          default: system
        concurrently:
          type: boolean
          title: Concurrently
          default: true
      additionalProperties: false
      type: object
      required:
      - dataset_id
      title: IndexDatasetRequest
    IndexResponse:
      properties:
        index_job_id:
          type: string
          title: Index Job Id
        dataset_id:
          type: string
          title: Dataset Id
        status:
          type: string
          title: Status
        indexes_created:
          type: integer
          title: Indexes Created
      additionalProperties: false
      type: object
      required:
      - index_job_id
      - dataset_id
      - status
      - indexes_created
      title: IndexResponse
    IngestionLogEntry:
      properties:
        level:
          type: string
          title: Level
        entity:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity
        message:
          type: string
          title: Message
        records_done:
          type: integer
          title: Records Done
        records_total:
          type: integer
          title: Records Total
        created_at:
          type: string
          format: date-time
          title: Created At
      additionalProperties: false
      type: object
      required:
      - level
      - entity
      - message
      - records_done
      - records_total
      - created_at
      title: IngestionLogEntry
    IngestionProgressResponse:
      properties:
        run_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Run Id
        dataset_id:
          type: string
          title: Dataset Id
        status:
          type: string
          title: Status
        started_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Started At
        finished_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Finished At
        records_done:
          type: integer
          title: Records Done
          default: 0
        records_total:
          type: integer
          title: Records Total
          default: 0
        entities:
          items:
            $ref: '#/components/schemas/EntityProgress'
          type: array
          title: Entities
          default: []
        recent_log:
          items:
            $ref: '#/components/schemas/IngestionLogEntry'
          type: array
          title: Recent Log
          default: []
      additionalProperties: false
      type: object
      required:
      - run_id
      - dataset_id
      - status
      title: IngestionProgressResponse
      description: Aggregated batch-ingestion progress for a dataset (polled by the
        Admin UI).
    IngestionRunResponse:
      properties:
        run_id:
          type: string
          title: Run Id
        dataset_id:
          type: string
          title: Dataset Id
        status:
          $ref: '#/components/schemas/IngestionStatus'
        batch_size:
          type: integer
          title: Batch Size
        parallelism:
          type: integer
          title: Parallelism
        requested_by:
          type: string
          title: Requested By
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
