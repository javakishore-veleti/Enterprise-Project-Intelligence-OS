      - analysis
      summary: Get Dashboard Activity
      operationId: getDashboardActivity
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 15
          title: Limit
      - name: X-API-Key
        in: header
        required: false
