components:
  schemas:
    AnalysisRunListResponse:
      properties:
        project_key:
          type: string
          title: Project Key
        runs:
          items:
            $ref: '#/components/schemas/AnalysisRunSummary'
          type: array
          title: Runs
      additionalProperties: false
      type: object
      required:
      - project_key
      - runs
      title: AnalysisRunListResponse
    AnalysisRunResponse:
      properties:
        run_id:
          type: string
          title: Run Id
        project_key:
          type: string
          title: Project Key
        status:
          $ref: '#/components/schemas/AnalysisStatus'
        agent_keys:
          items:
            type: string
          type: array
          title: Agent Keys
        started_at:
          type: string
          format: date-time
          title: Started At
        finished_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Finished At
        findings:
          items:
            $ref: '#/components/schemas/RiskFindingResponse'
          type: array
          title: Findings
        reports:
          items:
            $ref: '#/components/schemas/ReportResponse'
          type: array
          title: Reports
          default: []
        project_count:
          anyOf:
          - type: integer
          - type: 'null'
          title: Project Count
      additionalProperties: false
      type: object
      required:
      - run_id
