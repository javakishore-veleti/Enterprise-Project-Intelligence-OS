        description: ISO date (YYYY-MM-DD). Include only findings on or before the
          end of that day.
      - name: projects
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Comma-separated project_keys to scope to. Absent -> all projects.
          title: Projects
        description: Comma-separated project_keys to scope to. Absent -> all projects.
