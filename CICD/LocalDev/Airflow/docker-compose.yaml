# Operational workflow scheduler. Reuses apache/airflow:2.10.0-python3.12.
# Minimal single-node "standalone" for local dev (LocalExecutor). DAGs are
# mounted from the repo Airflow/ tree. Heavier than the datastores to boot; the
# foundation slice does not require it running.
services:
  airflow:
    image: apache/airflow:2.10.0-python3.12
    container_name: local-airflow
    command: standalone
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
        postgresql+psycopg2://${PG_USER:-epi_os}:${PG_PASSWORD:-epi_os}@host.docker.internal:${PG_PORT:-5432}/airflow
      # Enable the REST API with basic auth so the middleware can trigger DAGs.
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      # The acquire DAG reports status to the host Ingestion-API and writes the
      # download to a mounted data dir.
      INGESTION_API_BASE_URL: http://host.docker.internal:8001
      PROJECTS_API_BASE_URL: http://host.docker.internal:8003
      DATASET_DATA_DIR: /opt/airflow/data
      # The ingest DAG batch-writes evidence directly to MongoDB (operational tier).
      MONGO_URI: mongodb://host.docker.internal:27017/epi_os
      MONGO_DATABASE: epi_os
      PIP_ADDITIONAL_REQUIREMENTS: "requests>=2.31.0 pymongo>=4.8"
    ports:
      - "8080:8080"
    volumes:
      - ../../../Airflow/dags:/opt/airflow/dags
      - ../../../Airflow/plugins:/opt/airflow/plugins
      - ../../../Airflow/config:/opt/airflow/config
      # Dataset dir: defaults to a Docker-managed named volume, but set
      # AIRFLOW_DATA_MOUNT to an absolute host path to keep the (large) archive
      # on local disk (also lets host-side mongorestore read it directly).
      - ${AIRFLOW_DATA_MOUNT:-epi_dataset_data}:/opt/airflow/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  epi_dataset_data:
